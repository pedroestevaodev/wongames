name: Client CI

on:
  pull_request:
    paths:
      - 'client/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/client-ci.yml'

  push:
    branches:
      - main
    paths:
      - 'client/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/client-ci.yml'

permissions:
  contents: read

concurrency:
  group: client-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate client
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --workspace=@wongames/client

      - name: Run typecheck
        run: npm run typecheck --workspace=@wongames/client

      - name: Run tests
        run: npm run test:ci --workspace=@wongames/client

      - name: Build client
        run: npm run build --workspace=@wongames/client