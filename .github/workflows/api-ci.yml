name: API CI

on:
  pull_request:
    paths:
      - 'api/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/api-ci.yml'

  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/api-ci.yml'

permissions:
  contents: read

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate API
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: npm run build --workspace=@wongames/api